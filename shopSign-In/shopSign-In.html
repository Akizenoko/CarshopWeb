<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="shopSign-In.css" rel="stylesheet"/>
    <title>Shop Sign-in | PrecisionDrive Auto</title>
</head>
<body>

<div id="signin">
    <div id="signin-box">

        <h3>Partner With Us</h3>
        <h1>Register Your Shop</h1>

        <form action="../shop/html/home.html">

            <fieldset class="form-group">
                <legend>Business Information</legend>
                <div class="form-field">
                    <label>Official Shop Name</label>
                    <input type="text" placeholder="Enter shop name">
                </div>
                <div class="form-field">
                    <label>Business Address</label>
                    <textarea placeholder="Full street address, City, Zip Code"></textarea>
                </div>
            </fieldset>

            <fieldset class="form-group">
                <legend>Verification</legend>
                <div class="form-field">
                    <label>Attach Business Permit (DTI/SEC)</label>
                    <input type="file">
                </div>
                <div class="form-field">
                    <label>Attach BIR Certificate</label>
                    <input type="file">
                </div>
                <div class="form-field">
                    <label>Front View Photo of Shop</label>
                    <input type="file">
                </div>
            </fieldset>

            <div id="terms-conditions">
                <input type="checkbox">
                <label>Accept Partner Terms and Conditions</label>
            </div>

            <button type="submit">Register Shop</button>
        </form>

    </div>
</div>

<footer>
    <p>© 2026 PrecisionDrive Auto | Connecting Cars with Bungkaniks</p>
</footer>

</body>
</html>
