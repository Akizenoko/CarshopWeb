<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | PrecisionDrive Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/Login&SigninStyle.css">
</head>
<body>

<nav class="nav-auth">
    <h1>PrecisionDrive Auto</h1>
    <a href="../index.html">Home</a>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h1>Log in</h1>
        <h3>Welcome to PrecisionDrive Auto</h3>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="annon@gmail.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Password">
                <div class="forgot-link">
                    <a href="forgotpass.html">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="btn-submit">Log in</button>
        </form>

        <div class="switch-auth">
            Don't have an account? <a href="Signin.html">Create one</a>
        </div>
    </div>
</div>

<footer class="simple-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
        <div class="footer-social">
            <a href="#"><img src="../Assets/Logo/facebook.png" alt="FB"></a>
            <a href="#"><img src="../Assets/Logo/instagram.png" alt="IG"></a>
            <a href="#"><img src="../Assets/Logo/twitter.png" alt="Twitter"></a>
        </div>
        <p class="footer-copyright">© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
    </div>
</footer>

<script src="scripts/Script_Login.js"></script>

</body>
</html>
