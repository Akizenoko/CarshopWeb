<body>
    
    <div id="Login">
            <div id="LoginBox">
                <h3>Welcome Back to PrecisionDrive Auto</h3>
                <form id="loginForm">
                    <h1>Log-in</h1>

                    <div id="LoginDetails">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Annon@gmail.com">
                    </div>

                    <div id="LoginDetails">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Password"> 
                        <p>Forgot Password?</p>
                    </div>

                    <button type="submit">Log-In</button>
                </form>
                
                <h2>Dont Have an Account? <a href="Signin.html">Create One</a></h2>
            </div>
    </div>
    
</body>
