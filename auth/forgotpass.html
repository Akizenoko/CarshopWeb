<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | PrecisionDrive Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/forgotpass.css">
</head>
<body>

<div class="page-wrapper">
    <!-- Simple header with back link -->
    <div class="topbar">
        <a href="login.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <div class="container">
        <div class="forgot-card">
            <div class="card-header">
                <i class="fas fa-key"></i>
                <h1>Forgot Password?</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form id="forgotForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div id="successMessage" class="success-message" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <p>Reset link sent! Please check your email inbox.</p>
            </div>

            <div class="card-footer">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

</div>
<footer class="simple-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
        <div class="footer-social">
            <a href="#"><img src="../Assets/Logo/facebook.png" alt="FB"></a>
            <a href="#"><img src="../Assets/Logo/instagram.png" alt="IG"></a>
            <a href="#"><img src="../Assets/Logo/twitter.png" alt="Twitter"></a>
        </div>
        <p class="footer-copyright">© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
    </div>
</footer>

<script src="scripts/forgotpass.js"></script>
</body>
</html>
