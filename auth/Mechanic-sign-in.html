<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Mechanic | PrecisionDrive Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/MechanicSignin.css">
</head>
<body>

<!-- Top Navigation Bar (consistent with other auth pages) -->
<nav class="nav-auth">
    <h1>PrecisionDrive Auto</h1>
    <a href="../Type_of_users/user/AccountUser.html">Back to Your Profile</a>
</nav>

<div class="auth-container">
    <div class="auth-card auth-card-wide">
        <h1>Become a Mechanic</h1>
        <h3>Join Our Team of Professionals</h3>

        <form action="../Type_of_users/mechanic/Mechanic_Homepage.html">
            <!-- Documents Section -->
            <fieldset>
                <legend><i class="fas fa-file-alt"></i> Documents</legend>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Attach NBI Clearance</label>
                    <input type="file" accept="image/*,application/pdf" >
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Attach Any Valid ID</label>
                    <input type="file" accept="image/*,application/pdf" >
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Attach Certifications</label>
                    <input type="file" accept="image/*,application/pdf" >
                </div>
                <div class="form-group">
                    <label><i class="fas fa-camera"></i> Attach a Selfie</label>
                    <input type="file" accept="image/*" >
                </div>
            </fieldset>

            <!-- About You Section -->
            <fieldset>
                <legend><i class="fas fa-user-cog"></i> About You</legend>
                <div class="form-group">
                    <label><i class="fas fa-pen-alt"></i> Short Description</label>
                    <textarea placeholder="Tell us about your experience, skills, and why you want to join..." rows="4" ></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-wrench"></i> Your Specialty (optional)</label>
                    <input type="text" placeholder="e.g., Engine Diagnostics, Transmission, Electrical">
                </div>
            </fieldset>

            <!-- Terms & Conditions -->
            <div class="terms-checkbox">
                <input type="checkbox" id="terms" required>
                <label for="terms">I accept the <a href="#">Terms and Conditions</a> and confirm that all information provided is accurate.</label>
            </div>

            <button type="submit" class="btn-submit">Submit Application <i class="fas fa-arrow-right"></i></button>
        </form>
    </div>
</div>

<footer class="simple-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
        <div class="footer-social">
            <a href="#"><img src="../Assets/Logo/facebook.png" alt="FB"></a>
            <a href="#"><img src="../Assets/Logo/instagram.png" alt="IG"></a>
            <a href="#"><img src="../Assets/Logo/twitter.png" alt="Twitter"></a>
        </div>
        <p class="footer-copyright">© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
    </div>
</footer>

</body>
</html>
