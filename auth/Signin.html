<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in | PrecisionDrive Auto</title>
    <link rel="stylesheet" href="styles/Login&SigninStyle.css"">
</head>
<body>

<div id="signin">
    <div id="signin-box">
        <h3>Welcome New Users</h3>
        <h1>Sign-in</h1>

        <form action="../Type_of_users/user/Home_Page_For_Users.html">

            <!-- Group 1: Name -->
            <fieldset class="form-group">
                <legend>Personal Info</legend>
                <div class="form-field">
                    <label>Username</label>
                    <input type="text" placeholder="Username">
                </div>
                <div class="form-field">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
                <div class="form-field">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last Name">
                </div>
            </fieldset>

            <!-- Group 2: Contact -->
            <fieldset class="form-group">
                <legend>Contact</legend>
                <div class="form-field">
                    <label>Email</label>
                    <input type="email" placeholder="anon@gmail.com">
                </div>
                <div class="form-field">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="09876543210">
                </div>
                <div class="form-field">
                    <label>Birthdate</label>
                    <input type="date">
                </div>
            </fieldset>

            <!-- Group 3: Location -->
            <fieldset class="form-group">
                <legend>Location</legend>
                <div class="form-field">
                    <label>Country</label>
                    <select class="field-select">
                        <option value="">Select Country</option>
                        <option>Philippines</option>
                        <option>Germany</option>
                        <option>Japan</option>
                        <option>Switzerland</option>
                        <option>China</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>City</label>
                    <select class="field-select">
                        <option value="">Select City</option>
                        <option>Zamboanga</option>
                        <option>Manila</option>
                        <option>Baguio</option>
                        <option>Isabela</option>
                        <option>Davao</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Barangay</label>
                    <select class="field-select">
                        <option value="">Select Barangay</option>
                        <option>Abong-Abong</option>
                        <option>Arena Blanco</option>
                        <option>Ayala</option>
                        <option>Baliwasan</option>
                        <option>Baluno</option>
                        <option>Boalan</option>
                        <option>Bolong</option>
                        <option>Buenavista</option>
                        <option>Bunguiao</option>
                        <option>Busay</option>
                    </select>
                </div>
            </fieldset>

            <!-- Group 4: Password -->
            <fieldset class="form-group">
                <legend>Security</legend>
                <div class="form-field">
                    <label>Password</label>
                    <input type="password" placeholder="Password">
                </div>
                <div class="form-field">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm Password">
                </div>
            </fieldset>

            <button type="submit">Sign-in</button>
        </form>

        <h2>Have an Account? <a href="login.html">Log-in</a></h2>
    </div>
</div>

<footer>
    <p>© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
</footer>

</body>
</html>
