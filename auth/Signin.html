<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | PrecisionDrive Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/Login&SigninStyle.css">
</head>
<body>

<nav class="nav-auth">
    <h1>PrecisionDrive Auto</h1>
    <a href="../index.html">Home</a>
</nav>

<div class="auth-container">
    <div class="auth-card auth-card-wide">
        <h1>Sign up</h1>
        <h3>Welcome New Users</h3>

        <form action="../Type_of_users/user/Home_Page_For_Users.html">

            <!-- Personal Info -->
            <fieldset>
                <legend>Personal Information</legend>
                <div class="form-row">
                    <div class="form-group"><label>Username</label><input type="text" placeholder="Username"></div>
                    <div class="form-group"><label>First Name</label><input type="text" placeholder="First Name"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Middle Name (Optional)</label><input type="text" placeholder="Middle Name"></div>
                    <div class="form-group"><label>Last Name</label><input type="text" placeholder="Last Name"></div>
                </div>
            </fieldset>

            <!-- Contact -->
            <fieldset>
                <legend>Contact Details</legend>
                <div class="form-row">
                    <div class="form-group"><label>Email</label><input type="email" placeholder="anon@gmail.com"></div>
                    <div class="form-group"><label>Phone Number</label><input type="tel" placeholder="09876543210"></div>
                </div>
                <div class="form-group"><label>Birthdate</label><input type="date"></div>
            </fieldset>

            <!-- Location -->
            <fieldset>
                <legend>Location</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label>Country</label>
                        <select>
                            <option value="">Select Country</option>
                            <option>Philippines</option><option>Germany</option><option>Japan</option>
                            <option>Switzerland</option><option>China</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <select>
                            <option value="">Select City</option>
                            <option>Zamboanga</option><option>Manila</option><option>Baguio</option>
                            <option>Isabela</option><option>Davao</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Barangay</label>
                    <select>
                        <option value="">Select Barangay</option>
                        <option>Abong-Abong</option><option>Arena Blanco</option><option>Ayala</option>
                        <option>Baliwasan</option><option>Baluno</option><option>Boalan</option>
                        <option>Bolong</option><option>Buenavista</option><option>Bunguiao</option>
                        <option>Busay</option>
                    </select>
                </div>
            </fieldset>

            <!-- Security -->
            <fieldset>
                <legend>Security</legend>
                <div class="form-row">
                    <div class="form-group"><label>Password</label><input type="password" placeholder="Password"></div>
                    <div class="form-group"><label>Confirm Password</label><input type="password" placeholder="Confirm Password"></div>
                </div>
            </fieldset>

            <!-- Government ID -->
            <div class="file-upload">
                <label>Attach Any Government Issued ID</label>
                <input type="file" accept="image/*,application/pdf">
            </div>

            <button type="submit" class="btn-submit">Sign up</button>
        </form>

        <div class="switch-auth">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>
</div>

<footer class="simple-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
        <div class="footer-social">
            <a href="#"><img src="../Assets/Logo/facebook.png" alt="FB"></a>
            <a href="#"><img src="../Assets/Logo/instagram.png" alt="IG"></a>
            <a href="#"><img src="../Assets/Logo/twitter.png" alt="Twitter"></a>
        </div>
        <p class="footer-copyright">© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
    </div>
</footer>

</body>
</html>
