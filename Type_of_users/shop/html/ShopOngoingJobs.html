<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Job Management | PrecisionDrive Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/ShopOngoingJobs.css">
</head>
<body>

<header>
    <a href="home.html">
        <button><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
    </a>
</header>

<main>
    <div class="page-header">
        <h1><i class="fa-solid fa-briefcase"></i> Repairs </h1>
        <p>Manage active repairs, update costs, and track progress.</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><i class="fa-solid fa-play-circle"></i> <span id="totalActive">0</span> Active Repairs</div>
        <div class="stat-card"><i class="fa-solid fa-check-double"></i> <span id="completedCount">0</span> Finished Repairs</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="active"><i class="fa-solid fa-play-circle"></i> Active Repairs</button>
        <button class="tab-btn" data-tab="finished"><i class="fa-solid fa-archive"></i> Finished Repairs</button>
    </div>

    <div id="activeJobsTab" class="tab-content active">
        <div class="jobs-grid" id="activeJobsContainer"></div>
    </div>

    <div id="finishedJobsTab" class="tab-content">
        <div class="jobs-grid" id="finishedJobsContainer"></div>
    </div>
</main>

<!-- Modal for Job Details: Cost Update + Progress Step -->
<div id="jobModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fa-solid fa-clipboard-list"></i> Job Details</h2>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button id="updateCostBtn" class="btn-primary"><i class="fa-solid fa-save"></i> Update Cost</button>
            <button id="nextStepBtn" class="btn-progress"><i class="fa-solid fa-arrow-right"></i> Mark Next Step</button>
            <button id="closeModalBtn" class="btn-secondary">Close</button>
        </div>
    </div>
</div>

<footer class="simple-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
        <div class="footer-social">
            <a href="#"><img src="../../../Assets/Logo/facebook.png" alt="FB"></a>
            <a href="#"><img src="../../../Assets/Logo/instagram.png" alt="IG"></a>
            <a href="#"><img src="../../../Assets/Logo/twitter.png" alt="Twitter"></a>
        </div>
        <p class="footer-copyright">© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
    </div>
</footer>

<script src="../script/ShopOngoingJobs.js"></script>
</body>
</html>
