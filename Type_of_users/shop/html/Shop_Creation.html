<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Precision Drive Auto - Add Shop</title>
  <link rel="stylesheet" href="../css/Shop_Creation.css">
</head>
<body>

  <div class="wrap">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="brand-text">
          <a href="../../mechanic/AccountMechanic.html"><p class="goback">Back</p></a>
          <br>
          <h2>Add Your Car Repair Shop</h2>
          <p class="subtitle">Precision Drive Auto — Partner Registration</p>
        </div>
      </div>

      <!-- Shop Info Section -->
      <div class="section">
        <p class="section-label">Shop information</p>

        <div class="grid-2">
          <div class="input-group">
            <label for="shop-name">Shop Name</label>
            <input id="shop-name" type="text" placeholder="e.g. FastFix Garage">
          </div>

          <div class="input-group">
            <label for="contact">Contact Number</label>
            <input id="contact" type="tel" placeholder="+63 9XX XXX XXXX">
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="shop@example.com">
          </div>

          <div class="input-group full">
            <label for="address">Shop Address</label>
            <input id="address" type="text" placeholder="Street, City, Province">
          </div>

          <div class="input-group full">
            <label for="services">Services Offered</label>
            <textarea id="services" placeholder="e.g. Engine Repair, Oil Change, Brake Service, Tire Rotation..."></textarea>
          </div>
        </div>

        <a href="home.html"><button class="btn-submit" type="submit">Register Shop</button></a>
      </div>

      <hr class="divider">

      <!-- Find Mechanics Section -->
      <div class="section">
        <p class="section-label">Find mechanics</p>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('search', this)">Search</button>
          <button class="tab" onclick="switchTab('browse', this)">Browse all</button>
        </div>

        <div id="searchPanel">
          <div class="search-row">
            <input class="search-input" id="searchInput" type="text" placeholder="Search by name or ID (e.g. M-003)...">
            <button class="btn-search" onclick="doSearch()">Search</button>
          </div>
        </div>

        <div id="browsePanel" style="display: none;">
          <div class="filter-row" id="filterRow"></div>
        </div>

        <div class="results-area" id="resultsArea"></div>
      </div>

      <hr class="divider">

      <!-- Shop Team Section -->
      <div class="team-section">
        <p class="section-label">Your shop team <span class="team-count" id="teamCount"></span></p>
        <div id="teamList"></div>
      </div>

    </div>
  </div>

  <script src="../script/addaccount.js"></script>

</body>
</html>
