<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Mechanic</title>

<link rel="stylesheet" href="styles/RequestForm.css">

<!-- Leaflet (Map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div class="container">

    <div class="form-box">
        <a href="Home_Page_For_Users.html">
        <h4>← Back</h4>
        </a>
    <h2>Edit Posted Issue</h2>

        <!-- Location -->
        <label>Pickup Location</label>
        <input type="text" id="location" placeholder="Bolong, Zamboanga City">

        <button onclick="getLocation()">📍 Use Current My Location</button>
        <button>📍 Use My Address</button>

        <!-- Map -->
        <div id="map"></div>

        <!-- Service -->
        <label>Service Type</label>
        <select>
            <option>Oil Change</option>
            <option>Flat Tire</option>
            <option>Battery Jumpstart</option>
            <option>Engine Repair</option>
            <option>Other (Requires Details)</option>
        </select>

        <label>Details</label>
        <textarea placeholder="Describe Issue"></textarea>
        <label>Attach Photo</label>
        <input type="file">

        <!-- Car Type -->
        <label>Vehicle Type</label>
        <select>
            <option value="SportsCar">Sports Car</option>
            <option value="">-- Choose Vehicle Type --</option>
            <option value="sedan">Sedan</option>
            <option value="hatchback">Hatchback</option>
            <option value="suv">SUV</option>
            <option value="pickup">Pickup Truck</option>
            <option value="van">Van</option>
            <option value="motorcycle">Motorcycle</option>
            <option value="truck">Truck (Heavy Duty)</option>
            <option value="electric">Electric Vehicle</option>
        </select>

        <!-- Brand -->
        <label>Brand</label>
        <select>
            <option value="bmw">BMW</option>
            <option value="">-- Select Brand --</option>
            <option value="toyota">Toyota</option>
            <option value="honda">Honda</option>
            <option value="mitsubishi">Mitsubishi</option>
            <option value="nissan">Nissan</option>
            <option value="ford">Ford</option>
            <option value="chevrolet">Chevrolet</option>
            <option value="hyundai">Hyundai</option>
            <option value="kia">Kia</option>
            <option value="mazda">Mazda</option>
            <option value="suzuki">Suzuki</option>
            <option value="isuzu">Isuzu</option>
            <option value="mercedes">Mercedes-Benz</option>
            <option value="audi">Audi</option>
            <option value="tesla">Tesla</option>
        </select>

        <!-- Model -->
        <input type="text" placeholder="BMW M3 GTR">

        <div class="rush">
        <input type="checkbox">
        <p> In A Rush (Additional Cost) </p>
        </div>
        
        <label>Phone Number</label>
        <input type="tel" placeholder="0912345678910">
        <button>Use Saved Phone Number</button>

        <a href="Home_Page_For_Users.html">
            <button class="request-btn">Save Edit</button>
        </a>
</div>

</div>

<script src="scripts/Form.js"></script>

</body>
</html>
