<head>

<body>

    <header class="topbar">
      <a class="btn-link" href="Home_Page_For_Users.html">← Back to Home</a>
    </header>

<!-- ========== MAIN CONTENT ========== -->
<main class="connections-container">
    <div class="page-header">
        <h1><i class="fas fa-users"></i> My Connections</h1>
        <p>Mechanics you follow and recent conversations</p>
    </div>

    <!-- Followed Mechanics Section -->
    <div class="section-card">
        <div class="section-header">
            <h2><i class="fas fa-heart"></i> Followed Mechanics</h2>
            <span class="count-badge" id="followedCount">0</span>
        </div>
        <div class="mechanic-grid" id="followedMechanicsGrid">
            <!-- Dynamically populated by JS -->
        </div>
    </div>

    <!-- Recent Interactions Section -->
    <div class="section-card">
        <div class="section-header">
            <h2><i class="fas fa-clock-rotate-left"></i> Recent Interactions</h2>
            <span class="count-badge" id="interactionCount">0</span>
        </div>
        <div class="interaction-list" id="interactionsList">
            <!-- Dynamically populated by JS -->
        </div>
    </div>
</main>

<footer class="simple-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>

        <div class="footer-social">

            <a href="#"><img src="../../Assets/Logo/instagram.png" alt="IG"></a>
            <a href="#"><img src="../../Assets/Logo/twitter.png" alt="Twitter"></a>
        </div>
        <p class="footer-copyright">© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
    </div>
</footer>
