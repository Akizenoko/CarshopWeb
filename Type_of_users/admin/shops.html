<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shops Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/Styles.css">
    <script src="scripts/admin.js" defer></script>
</head>

<body>

    <div id="NavBar">
        <button id="menuBtn">☰</button>
        <h2>Admin Panel</h2>
        <a href="../../index.html">
            <button id="logout">Logout</button>
        </a>
    </div>

    <div id="sidebar">
        <h3>Control Panel</h3>
        <a href="Admin.html"><button class="tab active">Dashboard</button></a>
        <a href="users.html"><button class="tab">Users</button></a>
        <a href="mechanics.html"><button class="tab">Mechanics</button></a>
        <a href="shops.html"><button class="tab">Shops</button></a>
        <a href="reports.html"><button class="tab">Reports</button></a>
        <a href="../../index.html"><button class="tab">Logout</button></a>
    </div>

    <div id="main">
    <div class="section">
        <h2>Shop Management</h2>
        <div class="search-bar">
            <input type="text" id="shopSearch" placeholder="Search shops..." onkeyup="filterShops()">
            <button class="btn-primary" onclick="openModal('createShopModal')">Register Shop</button>
        </div>
        <div class="table-container">
            <table id="shopTable">
                <thead>
                    <tr>
                        <th>Shop Name</th>
                        <th>Owner</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Violations</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="shopPagination" class="pagination"></div>
    </div>
    </div>
    <div id="createShopModal" class="modal">
        <div class="modal-content">
            <h3>Register Shop</h3>
            <input id="shopNameNew" placeholder="Shop Name">
            <input id="shopOwner" placeholder="Owner Name">
            <input id="shopLoc" placeholder="Location">
            <div class="modal-buttons">
                <button class="btn-primary" onclick="addShopRow()">Create</button>
                <button class="btn-danger" onclick="closeModal('createShopModal')">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
