<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../Style/Login&SigninStyle.css" rel="stylesheet"/>
    <title>Sign-in | PrecisionDrive Auto</title>
</head>
<body>
    
    <div id="Sign-in">
        <div id="Sign-inBox">
                    <form action="LandingPage.html">
                        <h3>Welcome New Users</h3>
                        <h1>Sign-in</h1>

                        <div id="Sign-inDetails">
                        <label>Username</label>
                        <input type="text" placeholder="Username" required>
                        </div>

                        <div id="Sign-inDetails">
                        <label>Email</label>
                        <input type="email" placeholder="anon@gmail.com" required>
                        </div>

                        <div id="Sign-inDetails">
                        <label>Password</label>
                        <input type="password" placeholder="Password" required> 
                        </div>

                        <div id="Sign-inDetails">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Password" required> 
                        </div>
                    
                        <button type="submit">Sign-in</button>
                    </form>
                    <h2>Have an Account? <a href="login.html">Log-in</a></h2>

        </div>
    </div>
    
</body>
</html>
