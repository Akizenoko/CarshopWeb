<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../Style/Msignin.css" rel="stylesheet"/>
    <title>Sign-in | PrecisionDrive Auto</title>
</head>
<body>

<div id="signin">
    <div id="signin-box">

        <h3>Join Our Team</h3>
        <h1>Become a Mechanic!</h1>

        <form action="MechLand.html">

            <!-- File Uploads -->
            <fieldset class="form-group">
                <legend>Documents</legend>
                <div class="form-field">
                    <label>Attach NBI Clearance</label>
                    <input type="file">
                </div>
                <div class="form-field">
                    <label>Attach Any Valid ID</label>
                    <input type="file">
                </div>
                <div class="form-field">
                    <label>Attach a Selfie</label>
                    <input type="file">
                </div>
            </fieldset>

            <!-- Description -->
            <fieldset class="form-group">
                <legend>About You</legend>
                <div class="form-field">
                    <label>Write a Short Description of Yourself</label>
                    <textarea placeholder="Type here..."></textarea>
                    <label>Your Specialty (If you have any)</label>
                    <input placeholder="Specialty">
                </div>
            </fieldset>

            <!-- Terms -->
            <div id="terms-conditions">
                <input type="checkbox" required>
                <label>Accept Terms and Conditions</label>
            </div>

            <button type="submit">Become Mechanic</button>
        </form>

    </div>
</div>

<footer>
    <p>© 2026 PrecisionDrive Auto | Connecting Cars with Experts</p>
</footer>

</body>
</html>
