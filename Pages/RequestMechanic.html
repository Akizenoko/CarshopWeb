<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Mechanic</title>

<link rel="stylesheet" href="../Style/RequestMech.css">

<!-- Leaflet (Map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div class="container">

    <div class="form-box">
        <a href="LandingPage.html">
        <h4>← Back</h4>
        </a>
    <h2>🚗 Request a Mechanic</h2>

        <!-- Location -->
        <label>Pickup Location</label>
        <input type="text" id="location" placeholder="Detecting location...">

        <button onclick="getLocation()">📍 Use My Location</button>

        <!-- Map -->
        <div id="map"></div>

        <!-- Service -->
        <label>Service Type</label>
        <select>
            <option>Flat Tire</option>
            <option>Battery Jumpstart</option>
            <option>Engine Repair</option>
            <option>Oil Change</option>
            <option>Other (Requires Details)</option>
        </select>
        <label>Details</label>
        <textarea placeholder="Describe Issue"></textarea>

        <!-- Car Type -->
        <label>Vehicle Type</label>
        <select>
            <option value="">-- Choose Vehicle Type --</option>
            <option value="sedan">Sedan</option>
            <option value="hatchback">Hatchback</option>
            <option value="suv">SUV</option>
            <option value="pickup">Pickup Truck</option>
            <option value="van">Van</option>
            <option value="motorcycle">Motorcycle</option>
            <option value="truck">Truck (Heavy Duty)</option>
            <option value="electric">Electric Vehicle</option>
        </select>

        <!-- Brand -->
        <label>Brand</label>
        <select>
            <option value="">-- Select Brand --</option>
            <option value="toyota">Toyota</option>
            <option value="honda">Honda</option>
            <option value="mitsubishi">Mitsubishi</option>
            <option value="nissan">Nissan</option>
            <option value="ford">Ford</option>
            <option value="chevrolet">Chevrolet</option>
            <option value="hyundai">Hyundai</option>
            <option value="kia">Kia</option>
            <option value="mazda">Mazda</option>
            <option value="suzuki">Suzuki</option>
            <option value="isuzu">Isuzu</option>
            <option value="bmw">BMW</option>
            <option value="mercedes">Mercedes-Benz</option>
            <option value="audi">Audi</option>
            <option value="tesla">Tesla</option>
        </select>

        <!-- Model -->
        <input type="text" placeholder="Model (e.g. Vios)">
         <a href="LandingPage.html">
        <button class="request-btn">Post Issue</button>
        </a>
    </div>

</div>

<script src="../Form.js"></script>

</body>
</html>
